name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

  vet:
    name: vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test (race)
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: concurrency stampede test
        run: go test -race -tags=integration -v -count=1 -run TestReservationRepository_concurrentStampede ./test/integration/...

      - name: integration and contract tests
        run: go test -race -tags=integration ./test/integration/... ./test/contract/...

  load-test:
    name: k6 stampede
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start compose stack
        run: docker compose -f deploy/compose/docker-compose.yml up -d --wait

      - name: Seed database
        env:
          DATABASE_URL: postgres://spotsync:spotsync@localhost:5432/spotsync?sslmode=disable
          JWT_SECRET: ci-test-secret
        run: go run ./cmd/seed

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run stampede load test
        env:
          API_BASE: http://localhost:8080/api/v1
        run: k6 run test/load/reserve_stampede.js

      - name: Stop compose stack
        if: always()
        run: docker compose -f deploy/compose/docker-compose.yml down -v

  kind-e2e:
    name: kind smoke
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: spotsync-ci

      - name: Build and load images
        run: |
          docker compose -f deploy/compose/docker-compose.yml build api worker
          kind load docker-image spotsync-api:latest --name spotsync-ci
          kind load docker-image spotsync-worker:latest --name spotsync-ci

      - name: Deploy stack
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/postgres-redis.yaml
          cp deploy/k8s/secrets.example.yaml deploy/k8s/secrets.yaml
          kubectl apply -f deploy/k8s/secrets.yaml
          kubectl apply -f deploy/k8s/spotsync.yaml
          kubectl -n spotsync rollout status deployment/spotsync-postgres --timeout=120s
          kubectl -n spotsync rollout status deployment/spotsync-redis --timeout=120s
          kubectl -n spotsync rollout status deployment/spotsync-api --timeout=180s

      - name: Smoke health
        run: |
          kubectl -n spotsync port-forward svc/spotsync-api 18080:80 &
          sleep 3
          curl -sf http://localhost:18080/healthz
          curl -sf http://localhost:18080/readyz

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build binaries
        run: |
          go build -o bin/spotsync ./cmd/api
          go build -o bin/spotsync-worker ./cmd/worker
          go build -o bin/spotsync-seed ./cmd/seed
