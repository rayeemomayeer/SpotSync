name: Deploy Render

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: trigger-render-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger deploy via Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_API_KEY / RENDER_SERVICE_ID not set — skipping API trigger."
            echo "If Render GitHub auto-deploy is enabled, this push still deploys from the dashboard hook."
            exit 0
          fi

          DEPLOY_ID=$(curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\":\"${GITHUB_SHA}\"}" | jq -r '.id')
          echo "Deploy ID: $DEPLOY_ID"

          for i in $(seq 1 60); do
            STATUS=$(curl -fsS "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.status')
            echo "Status: $STATUS"
            case "$STATUS" in
              live) break ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated) exit 1 ;;
            esac
            sleep 15
          done

          for i in $(seq 1 12); do
            if curl -fsS --max-time 20 https://spotsync-ei6g.onrender.com/healthz; then
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after deploy"
          exit 1
