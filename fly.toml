# Fly.io app configuration — https://fly.io/docs/reference/configuration/
# Create the app once: fly apps create spotsync
# Set secrets before first deploy (see README Deployment section).

app = 'spotsync'
primary_region = 'iad'

[build]
  dockerfile = 'deploy/docker/Dockerfile'

[env]
  PORT = '8080'
  MIGRATE_ON_STARTUP = 'true'
  LOG_LEVEL = 'info'
  BCRYPT_COST = '12'
  ALLOW_SELF_ADMIN_REGISTRATION = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/healthz'
    timeout = '5s'

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/readyz'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
