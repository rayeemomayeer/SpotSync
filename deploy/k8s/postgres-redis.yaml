apiVersion: apps/v1
kind: Deployment
metadata:
  name: spotsync-postgres
  namespace: spotsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spotsync-postgres
  template:
    metadata:
      labels:
        app: spotsync-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: spotsync
            - name: POSTGRES_PASSWORD
              value: spotsync
            - name: POSTGRES_DB
              value: spotsync
---
apiVersion: v1
kind: Service
metadata:
  name: spotsync-postgres
  namespace: spotsync
spec:
  selector:
    app: spotsync-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spotsync-redis
  namespace: spotsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spotsync-redis
  template:
    metadata:
      labels:
        app: spotsync-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: spotsync-redis
  namespace: spotsync
spec:
  selector:
    app: spotsync-redis
  ports:
    - port: 6379
      targetPort: 6379
