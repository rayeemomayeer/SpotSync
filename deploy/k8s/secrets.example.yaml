# Copy to secrets.yaml for kind/local (do not commit real secrets).
apiVersion: v1
kind: Secret
metadata:
  name: spotsync-secrets
  namespace: spotsync
type: Opaque
stringData:
  DATABASE_URL: postgres://spotsync:spotsync@spotsync-postgres:5432/spotsync?sslmode=disable
  REDIS_URL: redis://spotsync-redis:6379/0
  JWT_SECRET: kind-dev-secret-change-me
  CAPACITY_STRATEGY: row_lock
  MIGRATE_ON_STARTUP: "true"
  ALLOW_SELF_ADMIN_REGISTRATION: "true"
