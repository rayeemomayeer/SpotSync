services:
  postgres:
    image: postgres:16-alpine
    container_name: spotsync-postgres
    environment:
      POSTGRES_USER: spotsync
      POSTGRES_PASSWORD: spotsync
      POSTGRES_DB: spotsync
    ports:
      - "5432:5432"
    volumes:
      - spotsync_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotsync -d spotsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: spotsync-api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://spotsync:spotsync@postgres:5432/spotsync?sslmode=disable
      JWT_SECRET: local-dev-secret-change-me
      MIGRATE_ON_STARTUP: "true"
      ALLOW_SELF_ADMIN_REGISTRATION: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  spotsync_pg_data:
