services:
  postgres:
    image: postgres:16-alpine
    container_name: spotsync-postgres
    environment:
      POSTGRES_USER: spotsync
      POSTGRES_PASSWORD: spotsync
      POSTGRES_DB: spotsync
    ports:
      - "5432:5432"
    volumes:
      - spotsync_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotsync -d spotsync"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spotsync_pg_data:
