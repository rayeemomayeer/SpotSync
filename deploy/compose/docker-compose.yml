services:
  postgres:
    image: postgres:16-alpine
    container_name: spotsync-postgres
    environment:
      POSTGRES_USER: spotsync
      POSTGRES_PASSWORD: spotsync
      POSTGRES_DB: spotsync
    ports:
      - "5432:5432"
    volumes:
      - spotsync_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotsync -d spotsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spotsync-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: spotsync-api:latest
    expose:
      - "8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://spotsync:spotsync@postgres:5432/spotsync?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-dev-secret-change-me
      MIGRATE_ON_STARTUP: "true"
      ALLOW_SELF_ADMIN_REGISTRATION: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
      CAPACITY_STRATEGY: row_lock
      METRICS_TOKEN: local-metrics-token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    image: spotsync-worker:latest
    environment:
      DATABASE_URL: postgres://spotsync:spotsync@postgres:5432/spotsync?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-dev-secret-change-me
      MIGRATE_ON_STARTUP: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: spotsync-nginx
    ports:
      - "8080:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: spotsync-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  spotsync_pg_data:
