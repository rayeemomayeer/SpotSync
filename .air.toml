# Air — live reload for local API development.
# Install: go install github.com/air-verse/air@latest
#
# Windows: entrypoint uses `go run` so Smart App Control / WDAC does not block tmp/*.exe.

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/api"
  entrypoint = ["go", "run", "./cmd/api"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", "vendor", "deploy", "test", "docs", "migrations"]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  stop_on_error = true
  send_interrupt = false
  kill_delay = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
